                                <textarea className="w-full bg-[#1e1e1e] text-[#d4d4d4] font-mono text-sm p-6 rounded-xl border-2 border-slate-800 outline-none focus:border-blue-500 min-h-[400px] shadow-inner" value={form.code} onChange={e=>setForm({...form, code:e.target.value})} placeholder="<div>Write your HTML code here...</div>"></textarea>
                                
                                <button onClick={handleSave} className="w-full bg-blue-600 text-white py-5 rounded-xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-700 transition mt-6 text-sm flex items-center justify-center gap-3"><Icons.Save /> {editNoticeGlobal ? 'Update Official Notice' : 'Publish Official Notice'}</button>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // --- ADVANCED FEATURE BUILDER (English Light Theme) ---
    const FeatureBuilder = () => {
        const { setView, editFeatureGlobal, setEditFeatureGlobal } = useContext(AppContext);
        const [features, setFeatures] = useState(DB.getDynamicFeatures() || []);
        
        const [form, setForm] = useState(editFeatureGlobal || { id: Date.now(), title: '', location: '', code: '' });
        
        const [showLocator, setShowLocator] = useState(false);
        const [previewScreen, setPreviewScreen] = useState('Dashboard');

        const LOCATIONS = [
            "Dashboard Top", "Dashboard Middle", "Dashboard Bottom", 
            "Daily Activity Top", "Daily Activity Middle", "Daily Activity Bottom",
            "Weekly Report Top", "Weekly Report Middle", "Weekly Report Bottom",
            "Monthly Report Top", "Monthly Report Middle", "Monthly Report Bottom",
            "Constitutional Rules Top", "Constitutional Rules Middle", "Constitutional Rules Bottom",
            "Constitution Top", "Constitution Middle", "Constitution Bottom",
            "Rule Book Top", "Rule Book Middle", "Rule Book Bottom",
            "Ordinance Top", "Ordinance Middle", "Ordinance Bottom",
            "Protocol Tracker Top", "Protocol Tracker Middle", "Protocol Tracker Bottom",
            "Leave Protocol Top", "Leave Protocol Middle", "Leave Protocol Bottom",
            "Bank Detail Top", "Bank Detail Middle", "Bank Detail Bottom",
            "Finance Protocol Top", "Finance Protocol Middle", "Finance Protocol Bottom",
            "Amendments Top", "Amendments Middle", "Amendments Bottom",
            "Notes Top", "Notes Middle", "Notes Bottom",
            "Answer Writing Top", "Answer Writing Middle", "Answer Writing Bottom",
            "Management System Top", "Management System Middle", "Management System Bottom"
        ];

        const handleSave = () => {
            if(!form.title || !form.location || !form.code) return alert("Title, Location, and Code are mandatory.");
            let updated;
            if(editFeatureGlobal) { updated = features.map(f => f.id === form.id ? form : f); } 
            else { updated = [form, ...features]; }
            DB.saveDynamicFeatures(updated); 
            setFeatures(updated);
            alert("Feature Successfully Integrated into Website!");
            setEditFeatureGlobal(null); setView('management_system');
        };

        const handleLocationSelect = (loc) => {
            setForm({...form, location: loc});
            setShowLocator(false);
        };

        const InjectionBtn = ({ locName, label }) => (
            <button onClick={() => handleLocationSelect(locName)} className={`w-full py-4 rounded-xl border-2 border-dashed flex flex-col items-center justify-center transition my-3 ${form.location === locName ? 'bg-indigo-100 border-indigo-500 text-indigo-700 shadow-inner' : 'bg-indigo-50/40 border-indigo-300 text-indigo-500 hover:bg-indigo-100 hover:border-indigo-500'}`}>
                <span className="font-black text-[13px] tracking-wide">ADD AT THIS POINT</span>
                <span className="text-[9px] font-bold uppercase tracking-widest mt-1 bg-white px-2 py-0.5 rounded border border-indigo-100">({label})</span>
            </button>
        );

        const renderPreviewWireframe = () => {
            return (
                <div className="border-4 border-slate-800 rounded-3xl overflow-hidden bg-slate-50 relative shadow-2xl h-[600px] flex flex-col w-full">
                    <div className="bg-white p-4 border-b border-slate-200 flex justify-between items-center shadow-sm">
                        <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center"><Icons.Back/></div>
                        <div className="font-black text-slate-800 text-base uppercase tracking-wide">{previewScreen}</div>
                        <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center"><Icons.Bell/></div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 relative bg-[#f8fafc]">
                        <InjectionBtn locName={`${previewScreen} Top`} label="TOP INJECTION" />
                        
                        {previewScreen === 'Dashboard' && (
                            <div className="space-y-4 opacity-70 pointer-events-none">
                                <div className="h-40 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-3xl shadow-lg border border-slate-200 flex flex-col justify-center p-6"><div className="w-3/4 h-4 bg-white/20 rounded mb-2"></div><div className="w-1/2 h-8 bg-white/40 rounded"></div></div>
                                <div className="h-16 bg-white rounded-2xl shadow-sm border border-slate-200"></div>
                                <InjectionBtn locName="Dashboard Middle" label="MIDDLE INJECTION" />
                                <div className="grid grid-cols-2 gap-3"><div className="h-28 bg-white rounded-2xl shadow-sm border border-slate-200"></div><div className="h-28 bg-white rounded-2xl shadow-sm border border-slate-200"></div></div>
                            </div>
                        )}

                        {previewScreen === 'Daily Activity' && (
                            <div className="space-y-4 opacity-70 pointer-events-none">
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                                    <div className="w-1/3 h-5 bg-slate-200 rounded mb-4"></div>
                                    <div className="flex gap-3 items-center"><div className="w-5 h-5 bg-slate-200 rounded"></div><div className="w-2/3 h-3 bg-slate-100 rounded"></div></div>
                                    <div className="flex gap-3 items-center"><div className="w-5 h-5 bg-slate-200 rounded"></div><div className="w-1/2 h-3 bg-slate-100 rounded"></div></div>
                                </div>
                                <InjectionBtn locName="Daily Activity Middle" label="MIDDLE INJECTION" />
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                                    <div className="w-1/2 h-5 bg-slate-200 rounded mb-4"></div>
                                    <div className="flex gap-3 items-center"><div className="w-5 h-5 bg-slate-200 rounded"></div><div className="w-3/4 h-3 bg-slate-100 rounded"></div></div>
                                </div>
                            </div>
                        )}

                        {previewScreen === 'Rule Book' && (
                            <div className="space-y-4 opacity-70 pointer-events-none">
                                <div className="bg-white h-40 rounded-lg shadow-sm border border-slate-200 border-t-4 border-emerald-500 p-4 text-center"><div className="w-1/2 h-6 bg-slate-200 mx-auto rounded mb-4"></div><div className="w-full h-2 bg-slate-100 rounded mb-2"></div><div className="w-3/4 h-2 bg-slate-100 mx-auto rounded"></div></div>
                                <InjectionBtn locName="Rule Book Middle" label="MIDDLE INJECTION" />
                                <div className="bg-slate-100 h-16 rounded-lg shadow-sm border border-slate-200 flex items-center p-4 justify-between"><div className="w-1/3 h-4 bg-slate-300 rounded"></div><div className="w-6 h-6 bg-slate-200 rounded"></div></div>
                            </div>
                        )}

                        {!['Dashboard', 'Daily Activity', 'Rule Book'].includes(previewScreen) && (
                            <div className="space-y-4 opacity-70 pointer-events-none">
                                <div className="h-32 bg-white rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-400 font-bold uppercase tracking-widest text-xs">Original Section 1</div>
                                <InjectionBtn locName={`${previewScreen} Middle`} label="MIDDLE INJECTION" />
                                <div className="grid grid-cols-2 gap-4"><div className="h-24 bg-white rounded-2xl shadow-sm border border-slate-200"></div><div className="h-24 bg-white rounded-2xl shadow-sm border border-slate-200"></div></div>
                                <div className="h-32 bg-white rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-400 font-bold uppercase tracking-widest text-xs">Original Section 2</div>
                            </div>
                        )}

                        <InjectionBtn locName={`${previewScreen} Bottom`} label="BOTTOM INJECTION" />
                    </div>
                </div>
            );
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] pb-24 font-sans text-slate-800">
                <div className="bg-white sticky top-0 z-40 p-4 shadow-sm border-b border-slate-200 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <button onClick={() => { setEditFeatureGlobal(null); setView('management_system'); }} className="p-2 bg-slate-50 hover:bg-slate-100 rounded-full transition"><Icons.Back /></button>
                        <div><h2 className="text-xl font-black text-slate-800 leading-tight">Feature Builder</h2><p className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">{editFeatureGlobal ? 'Edit Component' : 'Create New Component'}</p></div>
                    </div>
                    <button onClick={() => setView('feature_list')} className="text-[10px] font-black uppercase bg-slate-800 text-white px-3 py-1.5 rounded shadow-sm hover:bg-slate-900">Features List</button>
                </div>

                <div className="p-4 max-w-5xl mx-auto space-y-6 mt-4">
                    
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 three-d-box">
                        <div className="flex items-center gap-4 mb-6 border-b border-slate-100 pb-4">
                            <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center border border-indigo-100"><Icons.Wand /></div>
                            <div><h3 className="font-black text-xl text-slate-800">Feature Details</h3><p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Name & Locate Injection Point</p></div>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Feature Name</label>
                                <input className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-sm font-bold outline-none focus:border-indigo-400 shadow-inner" value={form.title} onChange={e=>setForm({...form, title:e.target.value})} placeholder="e.g. Special Monthly Calendar Widget" />
                            </div>
                            
                            <div className="p-5 bg-slate-50 border border-slate-200 rounded-xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] font-black px-3 py-1 rounded-bl-lg uppercase tracking-widest">POSITIONING</div>
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-3">Where should this feature be injected?</label>
                                
                                <div className="flex flex-col md:flex-row gap-4">
                                    <div className="flex-1">
                                        <select className="w-full bg-white border border-slate-300 p-3.5 rounded-xl text-sm font-bold outline-none focus:border-indigo-500 shadow-sm" value={form.location} onChange={e=>setForm({...form, location:e.target.value})}>
                                            <option value="">-- Manually Select Department & Position --</option>
                                            {LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex items-center justify-center font-black text-slate-400 text-xs uppercase tracking-widest">OR</div>
                                    <button onClick={() => setShowLocator(true)} className="flex-1 bg-indigo-600 text-white py-3.5 rounded-xl font-black uppercase tracking-widest text-xs hover:bg-indigo-700 transition shadow-md flex items-center justify-center gap-2">
                                        <Icons.Search /> Locate System visually
                                    </button>
                                </div>
                                {form.location && <div className="mt-3 text-xs font-bold text-emerald-600 bg-emerald-50 p-2 rounded border border-emerald-100 inline-block shadow-sm">Selected Location: {form.location}</div>}
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 three-d-box">
                        <div className="flex items-center gap-4 mb-6 border-b border-slate-100 pb-4">
                            <div className="w-12 h-12 bg-slate-800 text-white rounded-xl flex items-center justify-center shadow-inner"><Icons.Code /></div>
                            <div><h3 className="font-black text-xl text-slate-800">Feature Code (HTML/Tailwind)</h3><p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Design Buttons, Boxes & Complex Features</p></div>
                        </div>

                        <div className="bg-blue-50 text-blue-900 p-6 rounded-2xl text-[11px] font-medium mb-6 shadow-inner border border-blue-200 leading-relaxed">
                            <div className="flex items-center gap-2 mb-3 border-b border-blue-200 pb-2">
                                <span className="bg-blue-600 text-white p-1 rounded"><Icons.Wand/></span>
                                <strong className="text-blue-800 text-sm uppercase tracking-widest font-black">Website Builder & Compiler Instructions</strong>
                            </div>
                            <ul className="list-disc pl-5 space-y-2 opacity-90 text-xs">
                                <li><strong>Complex Features:</strong> You can design entire grid systems, fancy cards, or complete mini-application UI designs here. They will merge directly into the website.</li>
                                <li><strong>Styling (Tailwind):</strong> Apply Tailwind classes directly within tags. Example: <code className="bg-white border border-blue-200 px-1.5 py-0.5 rounded text-blue-700 font-mono font-bold">class="bg-blue-500 p-4 rounded-xl shadow-lg"</code></li>
                                <li><strong>Interactive Buttons:</strong> To create new buttons, use HTML tags: <code className="bg-white border border-blue-200 px-1.5 py-0.5 rounded text-blue-700 font-mono font-bold">&lt;button class="font-bold bg-green-500 text-white p-3 rounded"&gt;Click Me&lt;/button&gt;</code></li>
                                <li><strong>Important Rule:</strong> DO NOT use <code className="bg-white border border-red-200 px-1.5 py-0.5 rounded text-red-600 font-mono font-bold">&lt;html&gt;, &lt;head&gt;, &lt;body&gt;</code> tags. Only write standard DIVs and UI components.</li>
                                <li><strong>Edit/Delete:</strong> Any feature created here can be safely edited or deleted from the Features List at any time without affecting the core website structure.</li>
                            </ul>
                        </div>

                        <textarea className="w-full bg-[#1e1e1e] text-[#d4d4d4] font-mono text-sm p-6 rounded-xl border-2 border-slate-800 outline-none focus:border-indigo-500 min-h-[400px] shadow-inner" value={form.code} onChange={e=>setForm({...form, code:e.target.value})} placeholder="\n<div class='bg-white p-6 rounded-2xl shadow-md border border-slate-200'>\n  <h3 class='font-black text-xl text-indigo-600 uppercase'>My Custom Grid Widget</h3>\n  <p class='text-sm text-slate-500 mt-2 mb-4 font-bold'>This entire box will be injected at the selected location.</p>\n  \n  <div class='grid grid-cols-2 gap-4'>\n     <div class='bg-slate-50 p-4 rounded-lg border border-slate-200'>Box 1</div>\n     <div class='bg-slate-50 p-4 rounded-lg border border-slate-200'>Box 2</div>\n  </div>\n  \n  <button class='mt-5 w-full bg-indigo-600 text-white py-3 rounded-xl font-black uppercase tracking-widest hover:bg-indigo-700'>Action Button</button>\n</div>"></textarea>
                        
                        <button onClick={handleSave} className="w-full bg-indigo-600 text-white py-5 rounded-xl font-black uppercase tracking-widest shadow-xl hover:bg-indigo-700 transition mt-6 text-sm flex items-center justify-center gap-3"><Icons.Save /> {editFeatureGlobal ? 'Update Feature Code' : 'Publish & Inject Feature'}</button>
                    </div>
                </div>

                {showLocator && (
                    <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md flex justify-center items-center p-4 animate-fade-in">
                        <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col overflow-hidden max-h-[90vh]">
                            <div className="p-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                <div>
                                    <h3 className="font-black text-lg text-slate-800 uppercase tracking-wide">Locate Website (Preview)</h3>
                                    <p className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mt-0.5">Visually Select Exact Injection Point</p>
                                </div>
                                <button onClick={() => setShowLocator(false)} className="px-4 py-2 bg-white text-slate-500 hover:text-red-500 rounded-xl shadow-sm border border-slate-200 font-bold text-xs">Close ✕</button>
                            </div>
                            
                            <div className="p-5 bg-slate-100 border-b border-slate-200 flex items-center gap-4">
                                <label className="text-xs font-black text-slate-600 uppercase tracking-widest whitespace-nowrap">Target View:</label>
                                <select className="flex-1 bg-white border border-slate-300 p-3 rounded-xl text-sm font-bold outline-none shadow-sm focus:border-indigo-400" value={previewScreen} onChange={e=>setPreviewScreen(e.target.value)}>
                                    <option value="Dashboard">Dashboard (Home Page)</option>
                                    <option value="Daily Activity">Daily Activity</option>
                                    <option value="Weekly Report">Weekly Report</option>
                                    <option value="Monthly Report">Monthly Report</option>
                                    <option value="Constitutional Rules">Constitutional Rules Hub</option>
                                    <option value="Constitution">Constitution V2</option>
                                    <option value="Rule Book">Rule Book</option>
                                    <option value="Ordinance">Ordinance</option>
                                    <option value="Protocol Tracker">Protocol Tracker</option>
                                    <option value="Management System">Management System</option>
                                    <option value="Leave Protocol">Leave Protocol</option>
                                    <option value="Bank Detail">Bank Detail (SBI/BOB)</option>
                                    <option value="Finance Protocol">Finance Protocol</option>
                                    <option value="Amendments">Future Amendments</option>
                                    <option value="Notes">Advanced Notepad</option>
                                    <option value="Answer Writing">Answer Writing V2</option>
                                </select>
                            </div>

                            <div className="p-6 bg-slate-300 flex-1 overflow-y-auto flex items-start justify-center">
                                <div className="w-full max-w-lg">
                                    {renderPreviewWireframe()}
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const FeatureList = () => {
        const { setView, setEditFeatureGlobal } = useContext(AppContext);
        const [features, setFeatures] = useState(DB.getDynamicFeatures() || []);

        const handleDelete = (id) => {
            if(confirm("Permanently delete this feature? It will be removed from the website immediately.")) {
                const updated = features.filter(f => f.id !== id);
                DB.saveDynamicFeatures(updated);
                setFeatures(updated);
            }
        };

        const handleEdit = (feature) => {
            setEditFeatureGlobal(feature);
            setView('feature_builder');
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] pb-24 font-sans text-slate-800">
                <div className="bg-white sticky top-0 z-40 p-4 shadow-sm border-b border-slate-200 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('management_system')} className="p-2 bg-slate-50 hover:bg-slate-100 rounded-full transition"><Icons.Back /></button>
                        <div><h2 className="text-xl font-black text-slate-800 leading-tight">Features List</h2><p className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Active System Components</p></div>
                    </div>
                    <button onClick={() => setView('feature_builder')} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest shadow-sm hover:bg-indigo-700 transition">+ Build New</button>
                </div>

                <div className="p-4 max-w-6xl mx-auto mt-4">
                    {features.length === 0 ? (
                        <div className="bg-white p-10 rounded-3xl border border-dashed border-slate-300 text-center three-d-box mt-10">
                            <div className="text-5xl mb-4 opacity-40">🪄</div>
                            <h3 className="font-black text-lg text-slate-800 uppercase">No Custom Features Built Yet</h3>
                            <p className="text-xs font-bold text-slate-500 mt-2 mb-6">Use the Feature Builder to design and inject components anywhere in the website.</p>
                            <button onClick={() => setView('feature_builder')} className="bg-slate-800 text-white px-6 py-3 rounded-xl text-sm font-bold uppercase tracking-widest shadow-md hover:bg-slate-900 transition mx-auto flex items-center gap-2"><Icons.Wand /> Open Builder</button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {features.map(f => (
                                <div key={f.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden three-d-box flex flex-col relative group">
                                    <div className="absolute top-0 right-0 bg-indigo-50 text-indigo-600 text-[9px] font-black px-3 py-1.5 rounded-bl-xl uppercase tracking-widest border-b border-l border-indigo-100 shadow-sm z-10">
                                        ACTIVE
                                    </div>
                                    <div className="p-5 border-b border-slate-100 bg-slate-50 flex-1">
                                        <h4 className="font-black text-lg text-slate-800 mb-1 leading-tight pr-12">{f.title}</h4>
                                        <div className="text-[10px] font-bold text-slate-600 bg-white border border-slate-200 px-2 py-1 inline-block rounded uppercase tracking-widest shadow-sm mt-2">
                                            📍 {f.location}
                                        </div>
                                    </div>
                                    
                                    <div className="p-4 bg-slate-900">
                                        <pre className="text-[8px] text-slate-400 font-mono h-24 overflow-hidden opacity-80 whitespace-pre-wrap">
                                            {f.code}
                                        </pre>
                                    </div>

                                    <div className="p-4 bg-white flex justify-between items-center gap-3 border-t border-slate-100">
                                        <button onClick={() => handleEdit(f)} className="flex-1 bg-indigo-50 text-indigo-700 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-indigo-100 transition border border-indigo-200 shadow-sm">Edit</button>
                                        <button onClick={() => handleDelete(f.id)} className="flex-1 bg-red-50 text-red-600 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-red-100 transition border border-red-200 shadow-sm">Delete</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // --- MAIN APP ROUTER (WITH GLOBAL HELP MODULE) ---
    const MainApp = () => {
        const { user, view, setView } = useContext(AppContext);
        
        if (!user) return <EntryScreen />;

        const renderView = () => {
            switch (view) {
                case 'dashboard': return <Dashboard />;
                case 'activity': return <ActivityForm />;
                case 'week': return <WeeklyView />;
                case 'month': return <MonthView />;
                
                case 'integrity_dashboard': return <ConstitutionalRulesDashboard />;
                case 'constitution_v2': return <ConstitutionV2 />;
                case 'rule_book': return <RuleBook />;
                case 'ordinance': return <Ordinance />;
                
                case 'protocol_tracker': return <ProtocolTracker />;
                case 'management_system': return <ManagementSystem />;
                
                case 'finance_protocol': return <FinanceProtocol />;
                case 'bank_sbi': return <BankDetail code="SBI" name="State Bank of India" color="bg-blue-800" onBack={()=>setView('finance_protocol')} />;
                case 'bank_bob': return <BankDetail code="BOB" name="Bank of Baroda" color="bg-orange-600" onBack={()=>setView('finance_protocol')} />;
                
                case 'leave_protocol': return <LeaveProtocol />;
                case 'future_amendments': return <FutureAmendments />;
                case 'answer_writing_v2': return <AnswerWritingV2 />;
                case 'notes_app': return <NotesApp />;
                
                case 'official_notices': return <OfficialNotices />;
                case 'feature_builder': return <FeatureBuilder />;
                case 'feature_list': return <FeatureList />;
                
                default: return <EntryScreen />;
            }
        };

        return (
            <>
                {renderView()}
                <GlobalHelpModule />
            </>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppProvider><MainApp /></AppProvider>);

    </script>
</body>
</html>
