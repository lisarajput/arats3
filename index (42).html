    const AnalysisEngine = { calculateScore: (dateStr, formData) => { if (!formData) return { score: 0, isFail: false, failReasons: ["No Data"] }; const currentSyllabus = getSyllabusForDate(dateStr); let totalScore = 0, totalWeight = 0, mandatoryFailed = false, failReasons = []; const dayOfMonth = new Date(dateStr).getDate(); const isException = dayOfMonth === LEGAL_CONFIG.SELF_CONTROL_HIDDEN_DAY; currentSyllabus.forEach(t => { if (isException && (t.id === 'self_control' || t.id === 'act_12')) return; totalWeight += t.weight; let completion = 0, passed = false; if (t.type === 'single') { passed = formData[t.id] === true; completion = passed ? 1 : 0; } else if (t.type === 'list') { const total = t.items.length; let checked = 0; (t.items||[]).forEach(i => { if (formData[t.id]?.[i]) checked++; }); completion = total > 0 ? (checked / total) : 0; passed = !(t.mandatory && completion < 0.5); } else if (t.type === 'sections') { let total = 0, checked = 0; Object.keys(t.sections||{}).forEach(sec => { (t.sections[sec]||[]).forEach(i => { total++; if (formData[t.id]?.[sec]?.[i]) checked++; }); }); completion = total > 0 ? (checked / total) : 0; passed = !(t.mandatory && completion < 0.5); } totalScore += (completion * t.weight); if (t.mandatory && !passed) { mandatoryFailed = true; failReasons.push(`FAILED: ${t.title}`); } }); let final = totalWeight > 0 ? Math.round((totalScore / totalWeight) * 100) : 0; if (final < LEGAL_CONFIG.MIN_PASSING_SCORE) { failReasons.push(`SCORE BELOW ${LEGAL_CONFIG.MIN_PASSING_SCORE}%`); return { score: final, isFail: true, failReasons }; } if (mandatoryFailed) return { score: final, isFail: true, failReasons }; return { score: final, isFail: false, failReasons: [] }; } };

    const WeeklyView = () => {
        const { user, setView, setCurrentDate } = useContext(AppContext);
        const [days, setDays] = useState([]);
        const [weekOffset, setWeekOffset] = useState(0);

        useEffect(() => {
            const curr = new Date();
            const day = curr.getDay(); 
            const diff = curr.getDate() - day + (day === 0 ? -6 : 1) + (weekOffset * 7);
            const monday = new Date(curr.setDate(diff));

            const arr = [];
            for (let i = 0; i < 7; i++) {
                const temp = new Date(monday); temp.setDate(monday.getDate() + i);
                const offset = temp.getTimezoneOffset() * 60000;
                const dateStr = new Date(temp.getTime() - offset).toISOString().split('T')[0];
                const entry = DB.getActivities()[dateStr];
                const stats = AnalysisEngine.calculateScore(dateStr, entry);
                arr.push({ date: dateStr, dayName: temp.toLocaleDateString('en-US', { weekday: 'long' }), score: stats.score, isFail: stats.isFail });
            }
            setDays(arr);
        }, [weekOffset]);

        const downloadWeekPDF = () => {
            const rows = (days || []).map(d => [d.date, d.dayName, `${d.score}%`, d.isFail ? "FAIL" : "PASS"]);

    // --- RESTORED 100% ORIGINAL MONTHLY CALENDAR (WITH SAFE INJECTIONS) ---
    const MonthView = () => {
        const { user, setView, setCurrentDate } = useContext(AppContext);
        const [days, setDays] = useState([]);
        const [selectedMonth, setSelectedMonth] = useState(new Date());
        const [leaveMap, setLeaveMap] = useState({});

        useEffect(() => {
            // Getting leaves array strictly avoiding crashes
            const leaveProto = DB.getLeaveProto();
            const leaves = leaveProto?.grid ? Object.values(leaveProto.grid).flat() : (leaveProto?.logs || []);
            const lMap = {};
            (leaves || []).forEach(l => { if(l.date) lMap[l.date] = l.type; });
            setLeaveMap(lMap);
        }, [selectedMonth]);

        useEffect(() => {
            const y = selectedMonth.getFullYear(), m = selectedMonth.getMonth();
            const totalDays = new Date(y, m + 1, 0).getDate();
            const firstDay = new Date(y, m, 1).getDay();
            const arr = [];
            for(let i=0; i<firstDay; i++) arr.push({ blank: true });
            for(let d=1; d<=totalDays; d++) {
                const dateObj = new Date(y, m, d);
                const offset = dateObj.getTimezoneOffset() * 60000;
                const dateStr = new Date(dateObj.getTime() - offset).toISOString().split('T')[0];
                const entry = DB.getActivities()[dateStr];
                const stats = AnalysisEngine.calculateScore(dateStr, entry);
                arr.push({ d, date: dateStr, score: stats.score, isFail: stats.isFail });
            }
            setDays(arr);
        }, [selectedMonth]);

        const changeMonth = (delta) => { const newDate = new Date(selectedMonth); newDate.setMonth(newDate.getMonth() + delta); setSelectedMonth(newDate); };
        
        const getColor = (item) => { 
            if (leaveMap[item.date]) {
                const lType = leaveMap[item.date];
                if(lType.includes('Standard')) return 'bg-purple-100 text-purple-800 border-purple-400 shadow-md';
                if(lType.includes('Emergency')) return 'bg-pink-100 text-pink-800 border-pink-400 shadow-md';
                if(lType.includes('Academic')) return 'bg-teal-100 text-teal-800 border-teal-400 shadow-md';
            }
            if(item.isFail) return 'bg-red-100 text-red-700 border-red-300'; 
            if(item.score === 0) return 'bg-white text-slate-300 border-slate-100'; 
            if(item.score < 50) return 'bg-red-50 text-red-600 border-red-200'; 
            if(item.score < 80) return 'bg-yellow-50 text-yellow-600 border-yellow-200'; 
            if(item.score < 90) return 'bg-green-100 text-green-700 border-green-300'; 
            return 'bg-green-600 text-white border-green-700 shadow-md'; 
        };
        
        const getStars = (score) => {
            if (score === 100) return '⭐⭐⭐⭐⭐';
            if (score >= 99) return '⭐⭐⭐⭐';
            if (score >= 97) return '⭐⭐⭐';
            if (score >= 95) return '⭐⭐';
            if (score >= 92) return '⭐';
            return '';
        };

        const downloadMonthlyReport = () => { 
            const filteredDays = (days || []).filter(d => !d.blank && d.score > 0);
            const rows = (days || []).filter(d => !d.blank).map(d => [d.date, `${d.score}%`, leaveMap[d.date] ? leaveMap[d.date] : (d.isFail ? "FAIL" : d.score > 0 ? "PASS" : "ABSENT")]); 
            const monthName = selectedMonth.toLocaleString('default', { month: 'long', year: 'numeric' }); 
            const avg = filteredDays.length > 0 ? Math.round(filteredDays.reduce((a,b)=>a+b.score,0)/filteredDays.length) : 0;
            PDFSystem.generate(`Monthly_Report_${monthName}`, `Monthly Assessment Record`, ["Date", "Score", "Status/Leave"], rows, { user: user.name, month: monthName }, avg, avg >= 50 ? "PASS" : "FAIL", false); 
        };

        return (
            <div className="pb-20 max-w-lg mx-auto min-h-screen bg-slate-50 p-6">
                <div className="flex justify-between items-center mb-6 bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                    <button onClick={() => setView('dashboard')} className="p-2 hover:bg-slate-100 rounded-lg"><Icons.Back /></button>
                    <div className="flex items-center gap-4">
                        <button onClick={()=>changeMonth(-1)} className="font-bold text-slate-500">&lt;</button>
                        <div className="font-bold text-lg text-slate-800">{selectedMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}</div>
                        <button onClick={()=>changeMonth(1)} className="font-bold text-slate-500">&gt;</button>
                    </div>
                    <DepartmentNoticeBtn officeName="Monthly Report" />
                </div>
                
                <DynamicFeatureRenderer location="Monthly Report Top" />
                
                <div className="grid grid-cols-7 gap-2 mb-2 text-center mt-4">{['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-[10px] font-bold text-slate-400">{d}</div>)}</div>
                <div className="grid grid-cols-7 gap-2">
                    {(days || []).map((item, i) => { 
                        if (item.blank) return <div key={i}></div>; 
                        const isLeave = leaveMap[item.date];
                        return (
                            <button key={item.date} onClick={() => { setCurrentDate(item.date); setView('activity'); }} className={`aspect-square rounded-xl flex flex-col items-center justify-center border transition relative overflow-hidden tap-effect ${getColor(item)}`}>
                                <span className="text-sm font-bold z-10">{item.d}</span>
                                {item.score > 0 && !isLeave && <span className="text-[9px] font-bold z-10">{item.score}%</span>}
                                {item.score >= 92 && !isLeave && <span className="text-[6px] tracking-tighter z-10 mt-0.5">{getStars(item.score)}</span>}
                                {item.isFail && !isLeave && <div className="absolute inset-0 flex items-center justify-center text-red-500/20 font-black text-3xl rotate-[-20deg]">F</div>}
                                {isLeave && <span className="text-[7px] font-black tracking-widest mt-1 uppercase opacity-80 text-center leading-tight">{isLeave.split(' ')[0]}</span>}
                            </button>
                        ); 
                    })}
                </div>

                <DynamicFeatureRenderer location="Monthly Report Middle" />
                
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 mt-6 text-[10px] space-y-2">
                    <div className="font-bold text-slate-400 uppercase mb-2 border-b pb-1">Grading System & Leaves</div>
                    <div className="grid grid-cols-2 gap-2">
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-red-500 rounded"></div><span>0-49% (Fail)</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-yellow-500 rounded"></div><span>50-79% (Avg)</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-green-500 rounded"></div><span>80-89% (Good)</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-green-700 rounded"></div><span>90-91% (Excel.)</span></div>
                        <div className="flex items-center gap-2 mt-2"><div className="w-3 h-3 bg-purple-400 rounded"></div><span>Standard Leave (Sun)</span></div>
                        <div className="flex items-center gap-2 mt-2"><div className="w-3 h-3 bg-pink-400 rounded"></div><span>Emergency Leave</span></div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-teal-400 rounded"></div><span>Academic Leave</span></div>
                    </div>
                </div>
                
                <DynamicFeatureRenderer location="Monthly Report Bottom" />
                
                <button onClick={downloadMonthlyReport} className="w-full mt-4 bg-slate-800 text-white py-3 rounded-xl font-bold flex justify-center gap-2 shadow-lg hover:opacity-90 transition tap-effect"><Icons.Pdf /> Download HD Marksheet PDF</button>
            </div>
        );

        const saveToDB = (updatedData) => {
            DB.saveConstitutionV2(updatedData);
            setConstData(updatedData);
        };

        const updatePreamble = (val) => { saveToDB({ ...constData, preamble: val }); };
        
        const addPart = () => {
            const updated = { ...constData };
            if (!updated.parts) updated.parts = [];
            const newPartNum = updated.parts.length + 1;
            updated.parts.push({ id: `part_${Date.now()}`, name: `Part ${newPartNum}: New Category`, articles: [] });
            saveToDB(updated);
        };
        
        const updatePartName = (partId, newName) => {
            const updated = { ...constData };
            if (!updated.parts) return;
            const pIdx = updated.parts.findIndex(p => p.id === partId);
            if(pIdx > -1) { updated.parts[pIdx].name = newName; saveToDB(updated); }
            setEditingPartId(null);
        };
        
        const deletePart = (partId, e) => {
            e.stopPropagation();
            if(!confirm("Delete this entire Part and all its Articles?")) return;
            const updated = { ...constData };
            if (updated.parts) {
                updated.parts = updated.parts.filter(p => p.id !== partId);
                saveToDB(updated);
            }
        };

        const addArticle = (partIdx) => {
            const updated = { ...constData };
            if (!updated.parts || !updated.parts[partIdx]) return;
            if (!updated.parts[partIdx].articles) updated.parts[partIdx].articles = [];
            const newArtNum = updated.parts[partIdx].articles.length + 1;
            updated.parts[partIdx].articles.push({ id: `ART-${Date.now()}`, title: `Article ${newArtNum}`, detail: '' });
            saveToDB(updated);

        const updateArticle = (partIdx, artIdx, field, val) => {
            const updated = { ...constData };
            if (updated.parts && updated.parts[partIdx] && updated.parts[partIdx].articles) {

                saveToDB(updated);

            if(!confirm("Delete this Article?")) return;
            const updated = { ...constData };

            setRuleData(updatedData);
        };

        const updatePreamble = (val) => { saveToDB({ ...ruleData, preamble: val }); };
        
        const addPart = () => {
            const updated = { ...ruleData };
            if (!updated.parts) updated.parts = [];
            const newPartNum = updated.parts.length + 1;
            updated.parts.push({ id: `r_part_${Date.now()}`, name: `Section ${newPartNum}: New Rule Category`, rules: [] });
            saveToDB(updated);
        };
        
        const updatePartName = (partId, newName) => {
            const updated = { ...ruleData };
            if (!updated.parts) return;
            const pIdx = updated.parts.findIndex(p => p.id === partId);
            if(pIdx > -1) { updated.parts[pIdx].name = newName; saveToDB(updated); }
            setEditingPartId(null);
        };
        
        const deletePart = (partId, e) => {
            e.stopPropagation();
            if(!confirm("Delete this entire Section and all its Rules?")) return;
            const updated = { ...ruleData };
            if (updated.parts) {
                updated.parts = updated.parts.filter(p => p.id !== partId);
                saveToDB(updated);
            }
        };

        const addRule = (partIdx) => {
            const updated = { ...ruleData };
            if (!updated.parts || !updated.parts[partIdx]) return;
            if (!updated.parts[partIdx].rules) updated.parts[partIdx].rules = [];
            const newRuleNum = updated.parts[partIdx].rules.length + 1;
            updated.parts[partIdx].rules.push({ id: `RULE-${Date.now()}`, title: `Rule ${newRuleNum}`, detail: '' });
            saveToDB(updated);
        };
        
        const updateRule = (partIdx, rIdx, field, val) => {
            const updated = { ...ruleData };
            if (updated.parts && updated.parts[partIdx] && updated.parts[partIdx].rules) {
                updated.parts[partIdx].rules[rIdx][field] = val;
                saveToDB(updated);
            }
        };
        
        const deleteRule = (partIdx, rIdx) => {
            if(!confirm("Delete this Rule?")) return;
            const updated = { ...ruleData };
            if (updated.parts && updated.parts[partIdx] && updated.parts[partIdx].rules) {
                updated.parts[partIdx].rules.splice(rIdx, 1);
                saveToDB(updated);
            }
        };

        const renderTargetNotices = (targetId) => {
            const relevant = ruleNotices.filter(n => n.ruleTarget === targetId);
            if(relevant.length === 0) return null;
            return (
                <div className="mt-4 space-y-3">
                    <h5 className="text-[10px] font-black text-emerald-600 uppercase tracking-widest border-b border-emerald-100 pb-1">Appended Notices</h5>
                    {relevant.map(n => (
                        <div key={n.id} className="bg-emerald-50/50 border border-emerald-200 p-4 rounded-xl shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 right-0 flex items-center gap-2 bg-emerald-500 text-white text-[8px] font-black px-2 py-0.5 rounded-bl-lg">
                                NOTICE <button onClick={() => PDFSystem.downloadHTMLNotice(`dummy-rule-${n.id}`, `Notice_${n.heading}`)} className="bg-white/20 px-1 rounded hover:bg-white/40"><Icons.Download/></button>
                            </div>
                            <h6 className="font-bold text-sm text-slate-800 mb-2">{n.heading}</h6>
                            <div id={`dummy-rule-${n.id}`} className="text-xs text-slate-700 bg-white p-4 rounded-lg border border-emerald-100 shadow-inner" dangerouslySetInnerHTML={{ __html: n.code || '' }} />
                        </div>
                    ))}
                </div>
            );
        };

        return (
            <div className="min-h-screen bg-[#f1f5f9] pb-24 font-sans text-slate-800">
                <div className="bg-white sticky top-0 z-40 p-4 shadow-sm border-b border-slate-200 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('integrity_dashboard')} className="p-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded-full transition"><Icons.Back /></button>
                        <div><h2 className="text-xl font-black text-slate-800 leading-tight">Rule Book</h2><p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Code of Conduct</p></div>
                    </div>
                    <div className="flex gap-2">
                        <DepartmentNoticeBtn officeName="Rule Book" />
                    </div>
                </div>

                <div className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                    <DynamicFeatureRenderer location="Rule Book Top" />

                    <div className="doc-page three-d-box p-8 border-t-4 border-emerald-500">
                        <div className="text-center mb-6 border-b-2 border-slate-200 pb-4 inline-block mx-auto">
                            <h3 className="font-serif text-2xl font-black text-slate-900 tracking-widest uppercase">The Oath (Preamble)</h3>
                        </div>
                        <textarea className="w-full bg-slate-50 border border-slate-200 p-6 rounded-xl font-serif text-sm font-bold text-slate-700 leading-loose outline-none focus:border-emerald-400 min-h-[150px] text-center shadow-inner" placeholder="I do swear that..." value={ruleData.preamble || ''} onChange={e=>updatePreamble(e.target.value)}></textarea>
                        {renderTargetNotices('Preamble')}
                    </div>

                    <DynamicFeatureRenderer location="Rule Book Middle" />

                    {(ruleData.parts || []).map((part, pIdx) => (
                        <div key={part.id} className="doc-page three-d-box p-0 overflow-hidden border-t-4 border-emerald-500">
                            <div className="p-6 bg-slate-100 flex justify-between items-center cursor-pointer border-b border-slate-200 group" onClick={() => setExpandedPart(expandedPart === part.id ? null : part.id)}>
                                <div className="flex-1 flex items-center gap-4">
                                    <span className="text-xs font-black bg-emerald-100 text-emerald-800 px-3 py-1.5 rounded-lg tracking-widest shadow-sm">SEC {pIdx + 1}</span>
                                    {editingPartId === part.id ? (
                                        <input autoFocus className="flex-1 bg-white border border-emerald-300 rounded outline-none text-slate-800 font-bold text-lg px-3 py-1" value={editingPartName} onChange={e=>setEditingPartName(e.target.value)} onBlur={() => updatePartName(part.id, editingPartName)} onKeyDown={(e) => { if(e.key==='Enter') updatePartName(part.id, editingPartName); }} onClick={e=>e.stopPropagation()} />
                                    ) : (
                                        <h3 className="font-black text-lg uppercase tracking-wide text-slate-800 flex-1">{part.name}</h3>
                                    )}
                                </div>
                                <div className="flex items-center gap-3">
                                    {!editingPartId && <button onClick={(e)=>{e.stopPropagation(); setEditingPartId(part.id); setEditingPartName(part.name);}} className="text-[10px] bg-slate-200 text-slate-600 hover:bg-slate-300 px-3 py-1.5 rounded font-bold uppercase opacity-0 group-hover:opacity-100 transition">Edit</button>}
                                    <button onClick={(e) => deletePart(part.id, e)} className="text-[10px] text-red-500 bg-red-50 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded font-bold uppercase opacity-0 group-hover:opacity-100 transition"><Icons.Trash/></button>
                                    <div className="text-slate-400 font-bold ml-2">{expandedPart === part.id ? '▲' : '▼'}</div>
                                </div>
                            </div>
                            
                            <div className="px-6">{renderTargetNotices(part.name)}</div>

                            {expandedPart === part.id && (
                                <div className="p-6 bg-white animate-fade-in space-y-6">
                                    <div className="flex justify-between items-center mb-2">
                                        <h4 className="font-black text-sm text-slate-500 uppercase tracking-widest">Mandatory Rules</h4>
                                        <button onClick={() => addRule(pIdx)} className="text-[10px] font-black bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg border border-emerald-100 hover:bg-emerald-100">+ ADD RULE</button>
                                    </div>
                                    
                                    {(part.rules || []).length === 0 ? <p className="text-xs text-slate-400 italic text-center py-4">No rules formulated.</p> : (part.rules || []).map((rule, rIdx) => (
                                        <div key={rule.id} className="bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-sm relative group">
                                            <button onClick={() => deleteRule(pIdx, rIdx)} className="absolute top-3 right-3 text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100"><Icons.Trash/></button>
                                            <div className="flex gap-3 items-center mb-3">
                                                <span className="text-[10px] font-black bg-emerald-600 text-white px-2 py-1 rounded shadow-sm">RULE {rIdx + 1}</span>
                                                <input className="flex-1 bg-transparent font-black text-slate-800 text-base outline-none border-b border-dashed border-slate-300 focus:border-emerald-400" value={rule.title || ''} onChange={e=>updateRule(pIdx, rIdx, 'title', e.target.value)} placeholder="Rule Title" />
                                            </div>
                                            <textarea className="w-full bg-white border border-slate-200 p-3 rounded-lg text-sm font-medium text-slate-700 outline-none focus:border-emerald-400 min-h-[80px]" value={rule.detail || ''} onChange={e=>updateRule(pIdx, rIdx, 'detail', e.target.value)} placeholder="Elaborate the rule..."></textarea>
                                            
                                            {renderTargetNotices(`${part.name} -> ${rule.title}`)}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    ))}

                    <button onClick={addPart} className="w-full bg-white border-2 border-dashed border-emerald-200 text-emerald-600 font-black uppercase tracking-widest py-4 rounded-xl hover:border-emerald-400 hover:bg-emerald-50 transition shadow-sm">+ Add New Section (Category)</button>
                    
                    <DynamicFeatureRenderer location="Rule Book Bottom" />
                </div>
            </div>
        );
    };// --- ORDINANCE MODULE (ORIGINAL RESTORED + SAFETY CHECKS) ---
    const Ordinance = () => {
        const { setView } = useContext(AppContext);
        const [activeOrd, setActiveOrd] = useState(null);
        const [ordCats, setOrdCats] = useState(DB.getOrdinanceCats() || []);
        
        const [editingCatId, setEditingCatId] = useState(null);
        const [editingCatName, setEditingCatName] = useState('');

        const allNotices = DB.getNotices() || [];

        const saveCatsToDB = (data) => {
            DB.saveOrdinanceCats(data);
            setOrdCats(data);
        };

        const addCategory = () => {
            const updated = [...(ordCats || []), { id: `New_Category_${Date.now()}`, icon: '📄' }];
            saveCatsToDB(updated);
        };

        const updateCategory = (oldId, newId) => {
            if(!newId || oldId === newId) return setEditingCatId(null);
            if(oldId === 'All Important Ordinance') return alert("Default category cannot be renamed.");
            
            const updated = (ordCats || []).map(c => c.id === oldId ? { ...c, id: newId } : c);
            saveCatsToDB(updated);
            
            const updatedNotices = allNotices.map(n => n.ordTarget === oldId ? { ...n, ordTarget: newId } : n);
            DB.saveNotices(updatedNotices);
            
            setEditingCatId(null);
        };

        const deleteCategory = (id, e) => {
            e.stopPropagation();
            if(id === 'All Important Ordinance') return alert("Default category cannot be deleted.");
            if(confirm(`Delete "${id}" category? Notices inside will lose this tag.`)) {
                saveCatsToDB((ordCats || []).filter(c => c.id !== id));
            }
        };

        return (
            <div className="min-h-screen bg-[#f1f5f9] pb-24 font-sans text-slate-800 relative">
                <div className="bg-white sticky top-0 z-40 p-4 shadow-sm border-b border-slate-200 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <button onClick={() => { if(activeOrd) setActiveOrd(null); else setView('integrity_dashboard'); }} className="p-2 bg-purple-50 text-purple-600 hover:bg-purple-100 rounded-full transition"><Icons.Back /></button>
                        <div><h2 className="text-xl font-black text-slate-800 leading-tight">Ordinance</h2><p className="text-[10px] font-bold text-purple-600 uppercase tracking-widest">{activeOrd || "Executive Directives"}</p></div>
                    </div>
                    <div className="flex gap-2">
                        <DepartmentNoticeBtn officeName="Ordinance" />
                    </div>
                </div>

                <div className="max-w-5xl mx-auto p-4 mt-4">
                    <DynamicFeatureRenderer location="Ordinance Top" />

                    {!activeOrd ? (
                        <div className="animate-fade-in">
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-6">
                                {(ordCats || []).map((cat, index) => (
                                    <React.Fragment key={cat.id}>
                                        {index === 4 && <div className="col-span-full"><DynamicFeatureRenderer location="Ordinance Middle" /></div>}
                                        <div className={`three-d-box p-4 rounded-2xl flex flex-col items-center justify-center text-center transition-transform hover:scale-[1.02] cursor-pointer group relative ${cat.id==='All Important Ordinance'?'border-2 border-yellow-400 bg-gradient-to-br from-yellow-50 to-white':'bg-white border border-slate-200'}`} onClick={() => setActiveOrd(cat.id)}>
                                            
                                            {cat.id !== 'All Important Ordinance' && (
                                                <button onClick={(e) => deleteCategory(cat.id, e)} className="absolute top-2 right-2 text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition bg-red-50 p-1.5 rounded-lg"><Icons.Trash/></button>
                                            )}

                                            <div className="text-3xl mb-3">{cat.icon}</div>
                                            
                                            {editingCatId === cat.id ? (
                                                <input autoFocus className="w-full text-center border-b-2 border-purple-400 outline-none font-black text-sm text-slate-800 bg-transparent py-1 mb-2" value={editingCatName} onChange={e=>setEditingCatName(e.target.value)} onBlur={()=>updateCategory(cat.id, editingCatName)} onKeyDown={(e)=>{if(e.key==='Enter') updateCategory(cat.id, editingCatName)}} onClick={e=>e.stopPropagation()} />
                                            ) : (
                                                <h3 className="font-black text-sm text-slate-800 uppercase tracking-wider mb-2">{cat.id}</h3>
                                            )}

                                            {cat.id !== 'All Important Ordinance' && !editingCatId && (
                                                <button onClick={(e)=>{e.stopPropagation(); setEditingCatId(cat.id); setEditingCatName(cat.id);}} className="text-[9px] font-bold text-purple-600 uppercase bg-purple-50 px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition mt-2">Edit Name</button>
                                            )}
                                            
                                            <span className="absolute bottom-2 left-2 text-[8px] font-black bg-slate-100 px-2 py-0.5 rounded text-slate-400">
                                                {cat.id === 'All Important Ordinance' ? allNotices.filter(n=>n.category==='Ordinance').length : allNotices.filter(n => n.category === 'Ordinance' && n.ordTarget === cat.id).length} Docs
                                            </span>
                                        </div>
                                    </React.Fragment>
                                ))}
                            </div>
                            <button onClick={addCategory} className="w-full bg-white border-2 border-dashed border-purple-300 text-purple-600 font-black uppercase tracking-widest py-4 rounded-xl hover:border-purple-500 hover:bg-purple-50 transition shadow-sm">+ Create New Ordinance Category</button>
                        </div>
                    ) : (
                        <div className="animate-slide-up space-y-6">
                            <div className="bg-gradient-to-r from-purple-800 to-indigo-900 text-white p-8 rounded-2xl shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10 text-6xl">⚖️</div>
                                <h3 className="text-2xl font-black uppercase tracking-widest mb-2">{activeOrd} Directives</h3>
                                <p className="text-xs font-bold text-purple-200 uppercase tracking-widest">Official Ordinance Records</p>
                            </div>

                            <DynamicFeatureRenderer location="Ordinance Middle" />

                            <div className="space-y-6">
                                {allNotices.filter(n => n.category === 'Ordinance' && (n.ordTarget === activeOrd || (activeOrd === 'All Important Ordinance'))).length === 0 ? (
                                    <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300 three-d-box">
                                        <div className="text-4xl mb-4 opacity-30">📭</div>
                                        <p className="text-sm font-black text-slate-500 uppercase tracking-widest">No Ordinances Passed Here.</p>
                                    </div>
                                ) : (
                                    allNotices.filter(n => n.category === 'Ordinance' && (n.ordTarget === activeOrd || (activeOrd === 'All Important Ordinance'))).map(n => (
                                        <div key={n.id} className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden three-d-box relative">
                                            <div className="p-5 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                                                <div>
                                                    <span className="bg-purple-100 text-purple-800 text-[10px] font-black px-3 py-1 rounded tracking-widest border border-purple-200">ORDINANCE: {n.ordTarget}</span>
                                                    <h4 className="font-black text-lg text-slate-800 mt-2">{n.heading}</h4>
                                                    <p className="text-xs font-bold text-slate-500 mt-1">Issued: {n.issueDate} {n.inactDate ? `| Enacted: ${n.inactDate}` : ''}</p>
                                                </div>
                                                <button onClick={() => PDFSystem.downloadHTMLNotice(`ord-render-${n.id}`, `Ordinance_${n.heading}`)} className="p-3 bg-purple-600 text-white rounded-xl shadow-md hover:bg-purple-700 transition flex items-center justify-center gap-2 text-xs font-bold uppercase"><Icons.Download /> Download HD PDF</button>
                                            </div>
                                            <div id={`ord-render-${n.id}`} className="p-6 bg-white min-h-[200px]">
                                                <div dangerouslySetInnerHTML={{ __html: n.code || '' }} />
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    <DynamicFeatureRenderer location="Ordinance Bottom" />
                </div>
            </div>
        );
    };

    // --- PROTOCOL TRACKER ---
    const ProtocolTracker = () => {
        const { setView } = useContext(AppContext);
        const [subjects, setSubjects] = useState(DB.getProtocolTrack() || []);
        const [expandedSubject, setExpandedSubject] = useState(null);
        
        const [newSubName, setNewSubName] = useState('');
        const [editingSubId, setEditingSubId] = useState(null);
        
        const saveAll = (data) => { DB.saveProtocolTrack(data); setSubjects(data); };

        const addSubject = () => {
            if(!newSubName) return;
            const updated = [{ id: Date.now(), name: newSubName, lectures: [] }, ...(subjects || [])];
            saveAll(updated); setNewSubName('');
        };
        const updateSubjectName = (id, newName) => { const updated = (subjects || []).map(s => s.id === id ? { ...s, name: newName } : s); saveAll(updated); setEditingSubId(null); };
        const addLecture = (subId) => {
            const updated = (subjects || []).map(s => {
                if(s.id === subId) { const newLec = { id: Date.now(), title: `Lecture ${(s.lectures || []).length + 1}`, date: '', remark: '', status: 'Pending' }; return { ...s, lectures: [...(s.lectures || []), newLec] }; }
                return s;
            }); saveAll(updated);
        };
        const updateLecture = (subId, lecId, field, value) => {
            const updated = (subjects || []).map(s => { if(s.id === subId) { const updatedLecs = (s.lectures || []).map(l => l.id === lecId ? { ...l, [field]: value } : l); return { ...s, lectures: updatedLecs }; } return s; });
            saveAll(updated);
        };
        const deleteLecture = (subId, lecId) => {
            const updated = (subjects || []).map(s => { if(s.id === subId) { return { ...s, lectures: (s.lectures || []).filter(l => l.id !== lecId) }; } return s; }); saveAll(updated);
        };
        const deleteSubject = (id) => { if(confirm("Delete this subject completely?")) saveAll((subjects || []).filter(s=>s.id!==id)); };

        const downloadPDF = () => {
            const rows = [];
            (subjects || []).forEach(s => {
                rows.push([s.name, `${(s.lectures || []).filter(l=>l.status==='Done').length}/${(s.lectures || []).length}`, "SUBJECT"]);
                (s.lectures || []).forEach(l => { rows.push([`  - ${l.title}`, l.status, l.date || '-']); });
            });
            PDFSystem.generate("Protocol_Archive", "Master Academic Protocol Tracking", ["Title / Subject", "Status / Progress", "Date Completed"], rows, { Total_Subjects: String((subjects || []).length) }, null, null, true);
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] p-4 pb-24 font-sans text-slate-800">
                <div className="flex items-center justify-between mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('dashboard')} className="p-2 bg-slate-50 hover:bg-slate-100 rounded-full transition"><Icons.Back /></button>
                        <div><h2 className="text-xl font-black text-slate-800 leading-tight">Protocol Tracking</h2><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Master Academic Archive</p></div>
                    </div>
                    <div className="flex gap-2 items-center">
                        <DepartmentNoticeBtn officeName="Protocol Tracking" />
                        <button onClick={downloadPDF} className="bg-slate-800 text-white p-2 rounded-lg hover:bg-slate-900 shadow-sm flex items-center justify-center"><Icons.Pdf /></button>
                    </div>
                </div>

                <div className="p-4 max-w-5xl mx-auto space-y-6 mt-2">
                    <DynamicFeatureRenderer location="Protocol Tracker Top" />

                    <div className="three-d-box p-4 flex gap-3 items-center bg-white shadow-sm border border-slate-200 rounded-2xl">
                        <input className="flex-1 bg-slate-50 border border-slate-200 p-4 rounded-xl text-sm font-bold text-slate-800 outline-none focus:border-blue-400 transition" placeholder="Add New Subject Category..." value={newSubName} onChange={e=>setNewSubName(e.target.value)} />
                        <button onClick={addSubject} className="bg-blue-600 text-white px-8 py-4 rounded-xl font-black shadow-md hover:bg-blue-700 transition tracking-widest text-sm">ADD</button>
                    </div>

                    <DynamicFeatureRenderer location="Protocol Tracker Middle" />

                    <div className="space-y-5">
                        {(subjects || []).map((sub, index) => (
                            <div key={sub.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden three-d-box transition-all">
                                <div className="p-5 bg-white flex justify-between items-center border-b border-slate-100 cursor-pointer hover:bg-slate-50" onClick={() => setExpandedSubject(expandedSubject === sub.id ? null : sub.id)}>
                                    <div className="flex items-center gap-4 flex-1">
                                        <span className="bg-slate-100 text-slate-600 font-black text-xs px-3 py-1.5 rounded-lg border border-slate-200">{index + 1}</span>
                                        {editingSubId === sub.id ? (
                                            <input autoFocus className="flex-1 font-bold text-slate-800 border-b-2 border-blue-400 outline-none bg-slate-50 px-2 py-1 text-sm" defaultValue={sub.name} onBlur={(e) => updateSubjectName(sub.id, e.target.value)} onClick={(e) => e.stopPropagation()} onKeyDown={(e) => { if(e.key==='Enter') updateSubjectName(sub.id, e.target.value); }} />
                                        ) : (
                                            <h3 className="font-black text-slate-800 text-base">{sub.name}</h3>
                                        )}
                                    </div>
                                    <div className="flex items-center gap-3">
                                        {!editingSubId && <button onClick={(e)=>{e.stopPropagation(); setEditingSubId(sub.id);}} className="text-slate-400 hover:text-blue-500 text-[10px] font-black uppercase tracking-widest bg-slate-50 px-2 py-1 rounded">Edit</button>}
                                        <span className="text-[10px] font-bold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">{(sub.lectures || []).length} Items</span>
                                        <div className={`text-slate-400 transition-transform ${expandedSubject === sub.id ? 'rotate-180' : ''}`}><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M19 9l-7 7-7-7" /></svg></div>
                                    </div>
                                </div>

                                {expandedSubject === sub.id && (
                                    <div className="p-5 bg-slate-50/50 animate-fade-in overflow-x-auto">
                                        <div className="flex justify-between items-center mb-4">
                                            <button onClick={() => addLecture(sub.id)} className="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-blue-200 transition shadow-sm">+ Add Lecture</button>

                            <div className={`h-full transition-all duration-1000 ${progress > 80 ? 'bg-red-500' : progress > 50 ? 'bg-orange-500' : 'bg-blue-600'}`} style={{width: `${progress}%`}}></div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 max-w-3xl mx-auto">
                            <div className="bg-white border-2 border-slate-100 p-5 rounded-xl text-center shadow-sm"><div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">STANDARD</div><div className="text-sm font-black text-slate-800">Sundays Only (Max 3)</div></div>

                        </div>
                    </div>

                    <DynamicFeatureRenderer location="Leave Protocol Middle" />

                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto three-d-box">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h3 className="font-black text-lg text-slate-800 uppercase tracking-wide">MONTHLY GRID LOG</h3>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Adding logs directly assigns to {activeMonth}</p>

                            <button onClick={addLog} className="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest shadow-md hover:bg-slate-900 transition">+ Add Log</button>

    // --- BANK DETAIL ---
    const BankDetail = ({ code, name, color, onBack }) => {
        const [bank, setBank] = useState(DB.getBank(code) || { balance: 0, logs: [] });
        const [form, setForm] = useState({ date: DB.getToday(), time: new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit'}), amount: '', type: 'CREDIT', remark: '' });

        const handleTransact = () => {
            if(!form.amount || !form.remark) return;
            let newBal = bank.balance || 0;
            if(form.type === 'CREDIT') newBal += Number(form.amount);
            else newBal -= Number(form.amount);
            const newLog = { id: Date.now(), ...form, amount: Number(form.amount), balanceAfter: newBal };
            const updated = { balance: newBal, logs: [newLog, ...(bank.logs || [])] };
            DB.saveBank(code, updated); setBank(updated);
            setForm({...form, amount: '', remark: ''});
        };

        const downloadBankPDF = () => {
            const rows = (bank.logs || []).map(l => [l.date, l.time, l.type, `Rs. ${l.amount}`, l.remark, `Rs. ${l.balanceAfter}`]);
            PDFSystem.generate(`${code}_Statement`, `${name} Statement`, ["Date", "Time", "Type", "Amount", "Remark", "Balance"], rows, { "Current Balance": `Rs. ${bank.balance || 0}` }, null, null, false);
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] pb-24 font-sans text-slate-800">
                <div className={`sticky top-0 z-40 p-4 shadow-sm flex items-center justify-between text-white ${color}`}>
                    <div className="flex items-center gap-3">
                        <button onClick={onBack} className="p-2 bg-white/20 hover:bg-white/30 rounded-full transition"><Icons.Back /></button>

                    <div className="flex items-center gap-2">
                        <DepartmentNoticeBtn officeName={`${code} Banking`} />
                        <button onClick={downloadBankPDF} className="p-2 bg-white/20 hover:bg-white/30 rounded-lg shadow-sm"><Icons.Pdf /></button>

                </div>

                    <DynamicFeatureRenderer location="Bank Detail Top" />

                            <div><label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Time</label><input type="time" className="w-full bg-slate-50 p-2.5 rounded outline-none border focus:border-blue-400 text-sm font-bold" value={form.time} onChange={e=>setForm({...form, time:e.target.value})} /></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Type</label><select className={`w-full p-2.5 rounded outline-none border font-bold text-sm ${form.type==='CREDIT'?'bg-green-50 text-green-700 border-green-200':'bg-red-50 text-red-700 border-red-200'}`} value={form.type} onChange={e=>setForm({...form, type:e.target.value})}><option value="CREDIT">Deposit (+)</option><option value="DEBIT">Withdraw (-)</option></select></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Amount</label><input type="number" className="w-full bg-slate-50 p-2.5 rounded outline-none border focus:border-blue-400 text-sm font-bold" placeholder="₹ 0" value={form.amount} onChange={e=>setForm({...form, amount:e.target.value})} /></div>
                        </div>
                        <div className="flex gap-4">
                            <input className="flex-1 bg-slate-50 p-3 rounded outline-none border focus:border-blue-400 text-sm" placeholder="Transaction Remark / Reason..." value={form.remark} onChange={e=>setForm({...form, remark:e.target.value})} />
                            <button onClick={handleTransact} className={`px-8 font-black text-white rounded uppercase tracking-widest shadow-md transition ${code==='SBI'?'bg-blue-800 hover:bg-blue-900':code==='BOB'?'bg-orange-600 hover:bg-orange-700':'bg-green-700 hover:bg-green-800'}`}>PROCESS</button>

    // --- FINANCE PROTOCOL ---
    const FinanceProtocol = () => {
        const { setView } = useContext(AppContext);
        const [finance, setFinance] = useState(DB.getFinanceProto() || { monthlyBudgets: {}, auditRegister: [] });
        const [activeMonth, setActiveMonth] = useState(new Date().toLocaleString('default', { month: 'long', year: 'numeric' }));

        const initMonth = () => {
            if(!finance?.monthlyBudgets?.[activeMonth]) {
                const newMonth = { opening: '', withdrawn: '', closing: '', rows: Array.from({length: 10}, () => ({ category: '', percent: '', inAllot: '', date: '', reason: '', done: false })) };
                const updated = { ...finance, monthlyBudgets: { ...(finance?.monthlyBudgets || {}), [activeMonth]: newMonth } };
                DB.saveFinanceProto(updated); setFinance(updated);
            }
        };
        useEffect(() => { initMonth(); }, [activeMonth]);

        const currentData = finance?.monthlyBudgets?.[activeMonth] || { opening: '', withdrawn: '', closing: '', rows: Array.from({length: 10}, () => ({ category: '', percent: '', inAllot: '', date: '', reason: '', done: false })) };

        const updateTop = (field, val) => { const updated = { ...finance, monthlyBudgets: { ...(finance?.monthlyBudgets || {}), [activeMonth]: { ...currentData, [field]: val } } }; DB.saveFinanceProto(updated); setFinance(updated); };
        const updateRow = (index, field, val) => { const newRows = [...(currentData?.rows || [])]; newRows[index] = { ...newRows[index], [field]: val }; const updated = { ...finance, monthlyBudgets: { ...(finance?.monthlyBudgets || {}), [activeMonth]: { ...currentData, rows: newRows } } }; DB.saveFinanceProto(updated); setFinance(updated); };
        const addAudit = () => { const newAudit = { id: Date.now(), date: '', credit: '', withdraw: '', reason: '', auditResult: 'Passed' }; const updated = { ...finance, auditRegister: [newAudit, ...(finance?.auditRegister || [])] }; DB.saveFinanceProto(updated); setFinance(updated); };
        const updateAudit = (id, field, val) => { const updated = { ...finance, auditRegister: (finance?.auditRegister || []).map(a => a.id === id ? { ...a, [field]: val } : a) }; DB.saveFinanceProto(updated); setFinance(updated); };
        const deleteAudit = (id) => { const updated = { ...finance, auditRegister: (finance?.auditRegister || []).filter(a => a.id !== id) }; DB.saveFinanceProto(updated); setFinance(updated); };

        const downloadFinPDF = () => {
            const rows = (finance?.auditRegister || []).map(a => [a.date, `Rs.${a.credit}`, `Rs.${a.withdraw}`, a.reason, a.auditResult]);
            PDFSystem.generate(`Finance_Audit`, `Financial Audit Register`, ["Date", "Credit", "Withdraw", "Reason", "Status"], rows, { Month: activeMonth }, null, null, false);
        };

                        <div><h2 className="text-xl font-black text-slate-800 leading-tight">Financial Protocol</h2><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Sanchit Nidhi Tracker</p></div>

                        <DepartmentNoticeBtn officeName="Financial Protocol" />
                        <button onClick={downloadFinPDF} className="p-2 bg-slate-800 text-white rounded-lg hover:bg-slate-900 shadow-sm"><Icons.Pdf /></button>
                        <input type="month" className="text-sm bg-slate-50 border border-slate-200 p-2 rounded-lg outline-none font-bold text-slate-700 focus:border-blue-400" onChange={(e) => { if(e.target.value) setActiveMonth(new Date(e.target.value).toLocaleString('default', { month: 'long', year: 'numeric' })) }} />
                    </div>
                </div>

                <div className="p-4 space-y-8 mt-4 max-w-6xl mx-auto">
                    <DynamicFeatureRenderer location="Finance Protocol Top" />

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                            <div className="p-4 bg-white/20 rounded-full"><Icons.Bank /></div>
                        </button>
                        <button onClick={() => setView('bank_bob')} className="three-d-box p-6 bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-2xl shadow-lg hover:scale-[1.02] transition-transform text-left flex justify-between items-center">
